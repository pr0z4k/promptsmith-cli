name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src
      - name: Format check
        run: python -m black --check src
      - name: Import order
        run: python -m isort --check-only src
      - name: Type check
        run: python -m mypy src/promptsmith
      - name: Test
        run: python -m pytest src/tests --cov=promptsmith --cov-report=term-missing

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build==1.5.0 twine==6.2.0
      - name: Build distributions
        id: build
        continue-on-error: true
        shell: bash
        run: python -m build > build.log 2>&1
      - name: Upload failed build log
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failed-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 1
      - name: Report build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: cat build.log && exit 1
      - run: python -m twine check dist/*
