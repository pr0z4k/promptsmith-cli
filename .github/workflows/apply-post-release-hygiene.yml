name: Apply post-release hygiene

on:
  push:
    branches:
      - audit/v1.0-post-release

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/v1.0-post-release
          fetch-depth: 0

      - name: Reconcile release documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace(
              '- **Source:** https://github.com/pr0z4k/promptsmith-cli\n'
              '- **Issues:** https://github.com/pr0z4k/promptsmith-cli/issues\n'
              '- **Releases:** [CHANGELOG.md](CHANGELOG.md)\n'
              '- **License:** [MIT](LICENSE)',
              '- **Download:** https://github.com/pr0z4k/promptsmith-cli/releases/latest\n'
              '- **Source:** https://github.com/pr0z4k/promptsmith-cli\n'
              '- **Issues:** https://github.com/pr0z4k/promptsmith-cli/issues\n'
              '- **Changelog:** [CHANGELOG.md](CHANGELOG.md)\n'
              '- **License:** [MIT](LICENSE)',
          )
          text = text.replace(
              'Spending thirty seconds improving a prompt is usually cheaper than spending ten minutes runing adversary network mental frameworks with a poor response.',
              'Spending thirty seconds improving a prompt is usually cheaper than spending ten minutes wrestling with a poor response.',
          )
          text = text.replace('PromptSmith-cli 1.0.0 (1)', 'PromptSmith-cli 1.0.0 (1.0)')
          text = text.replace('[v1.0 release notes](RELEASE_NOTES.md)', '[v1.0 release notes](docs/releases/1.0.0.md)')
          readme.write_text(text, encoding='utf-8')

          release_notes = Path('RELEASE_NOTES.md').read_text(encoding='utf-8')
          release_dir = Path('docs/releases')
          release_dir.mkdir(parents=True, exist_ok=True)
          (release_dir / '1.0.0.md').write_text(release_notes, encoding='utf-8')

          release_path = Path('RELEASE_NOTES.md')
          release_path.write_text(
              '# Release notes\n\n'
              'Release notes are versioned under [`docs/releases/`](docs/releases/).\n\n'
              '- [PromptSmith-cli 1.0.0](docs/releases/1.0.0.md)\n',
              encoding='utf-8',
          )

          security = Path('SECURITY.md')
          text = security.read_text(encoding='utf-8')
          text = text.replace(
              'Security fixes are applied to the latest release and current `main` while v1 is being prepared. Older beta builds may contain known downloader, filesystem, or lifecycle defects and should not be treated as supported.',
              'Security fixes are applied to the latest stable release and current `main`. Older beta builds may contain known downloader, filesystem, or lifecycle defects and are not supported.',
          )
          text = text.replace(
              'Custom model URLs must use HTTPS. A custom model without a supplied checksum receives format validation but not cryptographic identity verification. Only use models from publishers you trust.',
              'Custom model URLs should use HTTPS. Plain HTTP remains available for trusted internal mirrors, but it is vulnerable to tampering in transit and triggers a warning. A custom model without a supplied checksum receives format validation but not cryptographic identity verification. Only use models from publishers you trust.',
          )
          security.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          marker = '## 1.0.0 - first stable release'
          if marker not in text:
              header = '''# Changelog\n\n## 1.0.0 - first stable release\n\nPromptSmith-cli reaches its first stable release with a complete local-first prompt preflight workflow and a production-quality engineering baseline.\n\n### Highlights\n\n- Deterministic prompt analysis and readiness scoring\n- Rule, local LLM, and Hybrid refinement backends\n- Runtime GGUF model switching and hardened downloads\n- Local SQLite prompt history with export and deletion controls\n- Cross-platform CI and native portable builds\n- Stable package metadata, entrypoints, documentation, and security guidance\n\nSee [the complete v1.0.0 release notes](docs/releases/1.0.0.md).\n\n'''
              text = text.replace('# Changelog\n\n', header, 1)
              changelog.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/portable-builds.yml')
          text = workflow.read_text(encoding='utf-8')
          old = '''      - name: Create release and upload portable ZIPs\n        env:\n          GH_TOKEN: ${{ github.token }}\n        shell: bash\n        run: >-\n          gh release create "${GITHUB_REF_NAME}"\n          release-assets/*.zip\n          release-assets/SHA256SUMS.txt\n          --repo "${GITHUB_REPOSITORY}"\n          --verify-tag\n          --generate-notes\n          --title "PromptSmith-cli ${GITHUB_REF_NAME}"\n'''
          new = '''      - name: Create release and upload portable ZIPs\n        env:\n          GH_TOKEN: ${{ github.token }}\n        shell: bash\n        run: |\n          NOTES_FILE="docs/releases/${GITHUB_REF_NAME#v}.md"\n          NOTES_ARGS=(--generate-notes)\n          if [[ -f "$NOTES_FILE" ]]; then\n            NOTES_ARGS=(--notes-file "$NOTES_FILE")\n          fi\n\n          gh release create "${GITHUB_REF_NAME}" \\\n            release-assets/*.zip \\\n            release-assets/SHA256SUMS.txt \\\n            --repo "${GITHUB_REPOSITORY}" \\\n            --verify-tag \\\n            "${NOTES_ARGS[@]}" \\\n            --title "PromptSmith-cli ${GITHUB_REF_NAME}"\n'''
          if old not in text:
              raise SystemExit('portable release block did not match expected content')
          workflow.write_text(text.replace(old, new), encoding='utf-8')

          Path('.github/workflows/fix-exec.yml').unlink(missing_ok=True)
          Path('.github/workflows/apply-post-release-hygiene.yml').unlink(missing_ok=True)
          PY

      - name: Commit hygiene changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md SECURITY.md RELEASE_NOTES.md docs/releases/1.0.0.md .github/workflows/portable-builds.yml .github/workflows/fix-exec.yml .github/workflows/apply-post-release-hygiene.yml
          git commit -m "docs: reconcile v1.0 release hygiene"
          git push origin HEAD:audit/v1.0-post-release
