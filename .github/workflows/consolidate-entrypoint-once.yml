name: Consolidate entrypoint once

on:
  push:
    branches:
      - agent/consolidate-cli-entrypoint
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/consolidate-cli-entrypoint
          fetch-depth: 0

      - name: Consolidate application entrypoint
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path('src/promptsmith/cli/app.py')
          text = app_path.read_text(encoding='utf-8')

          old_import = 'from promptsmith.utils.path_utils import get_asset_path, get_project_root, get_user_data_dir\n'
          new_import = old_import + (
              'from promptsmith.core.runtime_model_fixes import configure_runtime_model_behavior\n'
              'from promptsmith.scripts.model_catalog import configure_model_catalog\n'
          )
          if old_import not in text:
              raise SystemExit('Expected path_utils import not found')
          text = text.replace(old_import, new_import, 1)

          old_bindings = '''    BINDINGS = [
              Binding("ctrl+q", "quit", "Quit"),
              Binding("ctrl+r", "refine", "Refine"),
              Binding("ctrl+y", "copy", "Copy"),
              Binding("ctrl+s", "save_config", "Save Config"),
              Binding("ctrl+a", "analyze", "Analyze"),
              Binding("down", "scroll_down", "Scroll Down"),
              Binding("up", "scroll_up", "Scroll Up"),
          ]'''
          new_bindings = '''    BINDINGS = [
              Binding("ctrl+q", "quit", "Quit"),
              Binding("ctrl+enter", "analyze", "Analyze"),
              Binding("ctrl+r", "refine", "Refine"),
              Binding("ctrl+shift+a", "select_prompt_all", "Select Prompt"),
              Binding("ctrl+y", "copy", "Copy"),
              Binding("ctrl+s", "save_config", "Save Config"),
              Binding("down", "scroll_down", "Scroll Down"),
              Binding("up", "scroll_up", "Scroll Up"),
          ]'''
          if old_bindings not in text:
              raise SystemExit('Expected legacy BINDINGS block not found')
          text = text.replace(old_bindings, new_bindings, 1)

          old_empty = 'self._analysis_output.update("Enter a prompt and press [Analyze] or [Refine]")'
          new_empty = '''self._analysis_output.update(
                          Content(
                              "Enter a prompt, then press Ctrl+Enter to analyze or Ctrl+R to refine. "
                              "Use Ctrl+Shift+A to select the whole prompt."
                          )
                      )'''
          if old_empty not in text:
              raise SystemExit('Expected empty-analysis hint not found')
          text = text.replace(old_empty, new_empty, 1)

          marker = '''    def action_analyze(self) -> None:
              """Analyze the prompt without refining."""'''
          select_action = '''    def action_select_prompt_all(self) -> None:
              """Select the complete prompt without relying on terminal Cmd+A."""
              self._prompt_input.focus()
              select_all = getattr(self._prompt_input, "action_select_all", None)
              if callable(select_all):
                  select_all()
                  self.status_message = "Prompt selected."
              else:
                  self.status_message = "Select All is unavailable in this Textual version."

          def action_analyze(self) -> None:
              """Analyze the prompt without refining."""'''
          if marker not in text:
              raise SystemExit('Expected action_analyze marker not found')
          text = text.replace(marker, select_action, 1)

          old_main = '''def main() -> None:
              import sys as _sys

              if "--version" in _sys.argv or "-V" in _sys.argv:
                  # Machine-checkable version output, also used by the build
                  # scripts' post-build smoke test.
                  print(f"{PRODUCT_NAME} {__version__} ({display_version()})")
                  return
              try:
                  PromptSmithApp().run()
              except KeyboardInterrupt:
                  print("\\nGoodbye!")
              except Exception as e:
                  logger.exception("Fatal error in PromptSmith-cli")
                  print(f"Error: {e}")'''
          new_main = '''def main() -> None:
              import sys as _sys

              configure_model_catalog()
              configure_runtime_model_behavior()
              if "--version" in _sys.argv or "-V" in _sys.argv:
                  # Machine-checkable version output, also used by the build
                  # scripts' post-build smoke test.
                  print(f"{PRODUCT_NAME} {__version__} ({display_version()})")
                  return
              try:
                  PromptSmithApp().run()
              except KeyboardInterrupt:
                  print("\\nGoodbye!")
              except Exception as exc:
                  logger.exception("Fatal error in PromptSmith-cli")
                  print(f"Error: {type(exc).__name__}: {exc}")'''
          if old_main not in text:
              raise SystemExit('Expected legacy main function not found')
          text = text.replace(old_main, new_main, 1)
          app_path.write_text(text, encoding='utf-8')

          pyproject = Path('pyproject.toml')
          project_text = pyproject.read_text(encoding='utf-8')
          old_scripts = 'promptsmith = "promptsmith.cli.launcher:main"\npromptsmith-cli = "promptsmith.cli.launcher:main"'
          new_scripts = 'promptsmith = "promptsmith.cli.app:main"\npromptsmith-cli = "promptsmith.cli.app:main"'
          if old_scripts not in project_text:
              raise SystemExit('Expected launcher script entries not found')
          pyproject.write_text(project_text.replace(old_scripts, new_scripts, 1), encoding='utf-8')

          Path('src/promptsmith/cli/launcher.py').unlink()
          Path('src/__init__.py').unlink()
          Path('.github/workflows/consolidate-entrypoint-once.yml').unlink()
          PY

      - name: Validate focused changes
        shell: bash
        run: |
          python -m compileall -q src/promptsmith
          python - <<'PY'
          from pathlib import Path
          import ast

          source = Path('src/promptsmith/cli/app.py').read_text(encoding='utf-8')
          tree = ast.parse(source)
          mains = [node for node in tree.body if isinstance(node, ast.FunctionDef) and node.name == 'main']
          assert len(mains) == 1
          assert not Path('src/promptsmith/cli/launcher.py').exists()
          assert not Path('src/__init__.py').exists()
          PY

      - name: Commit consolidated entrypoint
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: consolidate CLI entrypoint"
          git push origin HEAD:agent/consolidate-cli-entrypoint
